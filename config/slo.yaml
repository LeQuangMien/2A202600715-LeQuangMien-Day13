service: day13-observability-lab
window: 28d

slis:
  latency_p95_ms:
    objective: 5000        # Đã nâng lên 5000ms để khớp với runbook mới
    target: 99.5
    measurement: histogram_quantile(0.95, latency_ms)

  error_rate_pct:
    objective: 5           # Đã nâng lên 5% để khớp với runbook mới
    target: 99.0
    measurement: errors / total_requests * 100

  daily_cost_usd:
    objective: 2.5
    target: 100.0
    measurement: sum(cost_usd) per day