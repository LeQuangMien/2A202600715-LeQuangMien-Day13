service: day13-observability-lab
window: 28d

slis:
  latency_p95_ms:
    objective: 3000          # p95 response phải dưới 3s
    target: 99.5             # đạt 99.5% số requests
    note: Measured at API layer including RAG retrieval time

  error_rate_pct:
    objective: 2             # error rate dưới 2%
    target: 99.0
    note: HTTP 5xx errors over total requests

  daily_cost_usd:
    objective: 2.5           # chi phí LLM dưới $2.5/ngày
    target: 100.0
    note: Estimated token cost via mock pricing model

  quality_score_avg:
    objective: 0.75          # average quality score >= 0.75
    target: 95.0
    note: Heuristic score based on answer relevance and doc coverage